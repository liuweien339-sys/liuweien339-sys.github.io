<!DOCTYPE html>
<html>
<head>
    <style>
        .menu-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 40px;
            height: 40px;
            background: #24292e;
            border-radius: 5px;
            cursor: pointer;
            z-index: 100;
            padding: 8px;
        }
       
        .menu-line {
            width: 100%;
            height: 3px;
            background: white;
            margin: 5px 0;
        }
       
        .sidebar {
            position: fixed;
            top: 0;
            left: -250px;
            width: 250px;
            height: 100%;
            background: white;
            box-shadow: 2px 0 10px rgba(0,0,0,0.2);
            padding-top: 70px;
            transition: left 0.3s;
            z-index: 99;
        }
       
        .sidebar a {
            display: block;
            padding: 15px;
            color: #333;
            text-decoration: none;
            border-bottom: 1px solid #eee;
        }
       
        .sidebar a:hover {
            background: #f5f5f5;
        }
       
        .content {
            margin-left: 0;
            padding: 80px 20px 20px;
            transition: margin-left 0.3s;
        }
    </style>
</head>
<body>
    <div class="menu-btn" onclick="toggleMenu()">
        <div class="menu-line"></div>
        <div class="menu-line"></div>
        <div class="menu-line"></div>
    </div>
